name: GymApp CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Build project with Maven
        run: mvn clean install
        working-directory: ./GMS

      - name: Extract Git Commit SHA
        id: vars
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t pradumdhakad/gymapp:${{ env.SHA_SHORT }} .
          docker build -t pradumdhakad/gymapp:latest .
        working-directory: ./GMS

      - name: Push Docker Images
        run: |
          docker push pradumdhakad/gymapp:${{ env.SHA_SHORT }}
          docker push pradumdhakad/gymapp:latest




